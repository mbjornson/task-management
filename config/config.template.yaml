# Task Management Plugin Configuration
# Copy this file to ~/.claude/task-management-config/config.yaml
# and update the paths for your system.

paths:
  # Root directory containing all task folders
  tasks_root: "/path/to/your/Tasks"

folders:
  # Folder names within tasks_root
  tasks: "tasks"           # Items with due dates
  ideas: "ideas"           # Projects without due dates
  templates: "templates"   # Reusable task templates
  memories: "memories"     # Reference items (not actionable)
  bugs: "bugs"             # Issues to fix
  completed: "completed"   # Archived one-time tasks
  import: "import"         # Staging area for triage

links:
  format: "obsidian"       # "obsidian" for [[wiki-links]] or "markdown" for [text](path)

integrations:
  research_system: false   # Set to true to include research digest in /today
  apple_calendar: false    # Set to true to include today's Apple Calendar meetings in /today
  # apple_calendar_calendars: ["Calendar", "Work"]  # Optional: limit to these calendars; omit to use all calendars
  podcast_digest: false    # Set to true to include podcast digest in /today
  # podcast_digest_path: "/path/to/podcast-ripper/transcripts/digests"  # Directory containing yyyy-mm-dd.md digest files
  # podcast_digest_refresh_cmd: "/path/to/python3 /path/to/rip.py --digest"  # Optional: run before reading to materialize today's digest on demand (only today's is used — no stale fallback)
